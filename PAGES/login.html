<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Libreria de Fuentes -- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- FrameWork BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- Libreria de Iconos -->
    <script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>

    <!-- FAVICON DE LA APLICACIÓN DE MATRICULA -->
    <link rel="shortcut icon" href="../imagenes/logo.png" type="image/x-icon">

    <!-- Hoja de estilos -->
    <link rel="stylesheet" href="../CSS/login_styles.css">

    <!-- Librería Jquery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>
<body>
    

    <div class="contenedor_formulario">
        <article class="login-card">
            <h1 class="login__titulo">Iniciar Sesión</h1>
            <form class="formulario" id="loginForm">
            <div class="contenedor__input">
                <i class="fa-solid fa-user"></i>
                <input class="formulario__input" type="text" id="txtUsuario" placeholder="Usuario" required>
            </div>
            <div class="contenedor__input">
                <i class="fa-solid fa-lock"></i>
                <input class="formulario__input" type="password" id="txtPassword" placeholder="Contraseña" autocomplete="current-password" required>
                </div>
            <button class="formulario__boton" type="submit">Inicia Sesión</button>
            </form>
            <p class="formulario__mensaje">
            ¿No tienes una cuenta? <a href="#" class="formulario__link">Regístrate</a>
            </p>
            <div id="mensaje"></div>
            </article>
    </div>


    <script>
    </script>


    <!-- login JS -->
    <script src="../JS/login.js"></script>


    <!-- Librería SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Librería JS de bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
</body>
</html>
